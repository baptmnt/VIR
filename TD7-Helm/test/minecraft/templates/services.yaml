# Service pour la BDD
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-pgsvc
spec:
  selector:
    app: {{ include "minecraft.fullname" . }}-db
    {{- include "minecraft.labels" . | nindent 4 }}
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
---
# Service pour le site web
# Attention à bien mapper le port 5000 !
apiVersion: v1
kind: Service
metadata:
  name: {{ include "minecraft.fullname" . }}-websvc
spec:
  selector:
    app: {{ include "minecraft.fullname" . }}-web
    {{- include "minecraft.labels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: 5000
  type: ClusterIP