# Déploiement du site
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft.fullname" . }}-web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "minecraft.fullname" . }}-web
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "minecraft.labels" . | nindent 8 }}
        app: {{ include "minecraft.fullname" . }}-web
    spec:
      containers:
        - name: web
          # Rappel, l'image est composée de 
          # <repository>/<namespace>/<image>:<tag>
          image: {{ .Values.image.repository }}/{{ .Values.image.namespace }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
          ports:
          - containerPort: 5000
          env:
            - name: DB_HOSTNAME
              value: {{ include "minecraft.fullname" . }}-pgsvc
---
# Déploiement de la BDD
# Penser à config la variables d'environnement POSTGRES_PASSWORD
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "minecraft.fullname" . }}-db 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "minecraft.fullname" . }}-db
      {{- include "minecraft.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "minecraft.labels" . | nindent 8 }}
        app: {{ include "minecraft.fullname" . }}-db
    spec:
      containers:
        - name: db
          image: postgres
          ports:
          - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: admin