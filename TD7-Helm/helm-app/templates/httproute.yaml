# httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "helm-app.fullname" . }}-route
spec:
  parentRefs:
    - name: traefik-gateway
  hostnames:
    - "helm.localhost"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "helm-app.fullname" . }}-service
          port: 80