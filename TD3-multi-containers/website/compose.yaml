services:
  website:
    image: website:v3
    ports:
      - "5010:5000"
    depends_on:
      - postgres

  postgres:
    image: docker.io/postgres:16
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/

  db-utils:
    image: docker.io/postgres:16
    environment:
      PGPASSWORD: admin
      PGUSER: postgres
      PGHOST: postgres
      PGDB: postgres
    volumes:
      - db_utils:/backup/
    command:
      [
        "sh","-c",
        "until pg_isready ; do echo 'waiting for postgres...'; sleep 1; done; echo 'backup...'; pg_dump -d postgres > /backup/backup.sql"
      ]
    depends_on:
      - postgres

volumes:
  db_data:
  db_utils: