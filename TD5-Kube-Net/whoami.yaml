# Simple application with service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: who
  template:
    metadata:
      labels:
        app: who
    spec:
      containers:
      - name: whoami
        image: traefik/whoami
        ports:
          - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  selector:
    app: who
  ports:
  - port: 80
    targetPort: 80
  type: NodePort
